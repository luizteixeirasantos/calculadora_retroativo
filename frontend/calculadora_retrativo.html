<!doctype html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Calculadora Retroativo Salarial</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>

  <body>
    <div class="container">
      <h2>Calculadora Retroativo Salarial</h2>

      <label>Salário Antigo</label>
      <input type="number" id="salarioAntigo" step="0.01" />

      <label>Salário Novo</label>
      <input type="number" id="salarioNovo" step="0.01" />

      <label>Meses Retroativo</label>
      <input type="number" id="mesesRetro" />

      <label>Meses para 13º</label>
      <input type="number" id="meses13" />

      <label>INSS (%)</label>
      <input type="number" id="inss" value="7.82" step="0.01" />

      <h3>Descontos adicionais</h3>

      <div id="listaDescontos"></div>

      <button class="btn-add" onclick="addDesconto()">
        Adicionar desconto
      </button>

      <div class="result" id="resultado"></div>

      <button class="btn-pdf" onclick="gerarPDF()">Exportar PDF</button>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
